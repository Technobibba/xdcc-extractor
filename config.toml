##############################################
# XDCC Worker Configuration
##############################################

[watch]

# Ordner der überwacht wird
directory="/media/HDD3/XDCC_TEST"

# Sekunden bis ein Release vollständig ist
stable_after=30


[extract]

# Archive nach erfolgreichem Entpacken löschen
delete_archives=true

# Fehlerhafte Archive behalten
keep_failed=true

[history]

# Ordner für verarbeitete Releases
directory="state/history"
