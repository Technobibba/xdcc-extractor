##############################################
# XDCC Extractor Docker Configuration
##############################################

[watch]
directory="/downloads"
stable_after=30
allow_root_archives=true

[extract]
delete_archives=true
dry_run=true
keep_failed=true

[history]
directory="/state/history"

[retry]
base_delay=60
max_delay=1800

[startup]
scan_existing=false

[output]
directory="/downloads/_extracted"
