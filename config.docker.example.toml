##############################################
# XDCC Extractor Docker Configuration
##############################################

[watch]

# Hauptordner im Container.
directory="/downloads"

# Zusätzliche Ordner müssen ebenfalls als
# Docker-Volume eingebunden werden.
directories=[]

stable_after=30
allow_root_archives=true

[extract]
delete_archives=true
keep_failed=true
password_file="/config/passwords.txt"

[history]
directory="/state/history"

[retry]
base_delay=60
max_delay=1800

[startup]
scan_existing=false

[output]
directory="/downloads/_extracted"

[notifications]
enabled=true
provider="ntfy"

[notifications.ntfy]
server="https://ntfy.example.org"
topic="xdcc-extractor"
token=""
priority_success=3
priority_error=5
notify_on_worker_start=false
notify_on_processing_start=false
notify_on_success=true
notify_on_error=true
notify_on_every_error=false
notify_after_attempts=3

[web]
enabled=true
bind="0.0.0.0:8099"
