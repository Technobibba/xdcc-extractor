name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Verify and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7

      - name: Validate tag and Cargo version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          then
            echo "Ungültiger Release-Tag: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"

          CARGO_VERSION="$(
            sed -n \
              's/^version = "\([^"]*\)"/\1/p' \
              Cargo.toml \
            | head -n 1
          )"

          if [[ "$VERSION" != "$CARGO_VERSION" ]]
          then
            echo \
              "Tag-Version $VERSION stimmt nicht mit Cargo-Version $CARGO_VERSION überein." \
              >&2

            exit 1
          fi

          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "version=$VERSION" \
            >> "$GITHUB_OUTPUT"

          echo "image=$IMAGE" \
            >> "$GITHUB_OUTPUT"

          echo "Release-Version: $VERSION"
          echo "Container-Image: $IMAGE"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Run publication check
        run: ./scripts/publication-check.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.release.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=XDCC Extractor
            org.opencontainers.image.description=Automatic XDCC archive extraction worker
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

      - name: Prepare release notes
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
          IMAGE: ${{ steps.release.outputs.image }}
        run: |
          set -euo pipefail

          awk \
            -v version="$VERSION" \
            '
              $0 ~ "^## v" version "([[:space:]]|$)" {
                found = 1
                next
              }

              found && /^## / {
                exit
              }

              found {
                print
              }
            ' \
            CHANGELOG.md \
            > changelog-section.md

          if ! grep \
            -q \
            '[^[:space:]]' \
            changelog-section.md
          then
            echo \
              "Kein CHANGELOG-Abschnitt für v${VERSION} gefunden." \
              >&2

            exit 1
          fi

          {
            echo "## Docker-Image"
            echo
            echo "\`docker pull ${IMAGE}:${VERSION}\`"
            echo
            cat changelog-section.md
          } > release-notes.md

          echo "== Release Notes =="

          cat \
            release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            "$GITHUB_REF_NAME" \
            --verify-tag \
            --latest \
            --title \
            "XDCC Extractor $GITHUB_REF_NAME" \
            --notes-file \
            release-notes.md
