##############################################
# XDCC Extractor Configuration
##############################################

[watch]

# Ordner, den der Worker überwacht.
# Im Docker-Container ist das normalerweise /downloads.
directory="/downloads"

# Sekunden ohne Änderung, bevor ein Release als vollständig gilt.
stable_after=30

allow_root_archives=false

[extract]

# Archive nach erfolgreichem Entpacken löschen.
delete_archives=true

# Sicherheitsmodus: Wenn true, wird nichts wirklich gelöscht
dry_run=true

# Fehlerhafte Archive behalten.
keep_failed=true

# Optionale Passwortdatei.
# Leer lassen, wenn keine Passwortliste genutzt werden soll.
password_file=""

[history]

# Ordner für verarbeitete und fehlgeschlagene Releases.
directory="/state/history"


[retry]

# Mindestwartezeit nach einem Fehler in Sekunden.
base_delay=60

# Maximale Wartezeit nach mehreren Fehlern in Sekunden.
max_delay=1800

[startup]

# Wenn true, werden vorhandene Releases beim Start verarbeitet.
# Wenn false, verarbeitet der Worker nur neue Downloads ab Programmstart.
scan_existing=false

[output]

# Zielordner für entpackte Dateien.
directory="/downloads/_extracted"

[notifications.gotify]

# Gotify-Benachrichtigungen aktivieren.
enabled=false

# Beispiel:
# url="https://gotify.example.com"
url=""

# Gotify App Token.
# Niemals echte Tokens ins Git committen.
token=""

# Priorität für Erfolgsmeldungen.
priority_success=3

# Priorität für Fehlermeldungen.
priority_error=8

notify_on_success=true

notify_on_error=true

notify_on_every_error=false

notify_after_attempts=3

[web]
enabled=false
bind="0.0.0.0:8099"
